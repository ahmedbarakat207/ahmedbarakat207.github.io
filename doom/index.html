  <link rel="stylesheet" href="app.css">

  <script type="text/javascript" src="https://thedoggybrad.github.io/doom_on_js-dos/js-dos-api.js"></script>

  <body style="background-color:#000000; color: white; margin: 0; padding: 0; overflow-x: hidden;">
   
<style>
    html, body {
        width: 100%;
        margin: 0;
        padding: 0;
    }

    #DOOM {
        width: 100vw;
        margin: 0;
        display: block;
    }
    #DOOM .dosbox-container { 
        width: 100% !important; 
        height: auto !important; 
    }

    #DOOM canvas {
        width: 100% !important;
        height: auto !important;
    }

    #DOOM > .dosbox-container > .dosbox-overlay { 
        background: url("https://thedoggybrad.github.io/doom_on_js-dos/DOOM.png"); 
        border: 0px solid #000000;
        background-color: rgba(90, 90, 90, 0.57);
        padding: 5px;
        text-align: center;
        vertical-align: middle;
        width: 100%;
        margin: 0 auto;
        background-size: cover;
    }

    a:link {color:white}
</style>

<div id="DOOM" class="dosbox-default"></div>

<script type="text/javascript">
  var dosbox_DOOM = new Dosbox({
    id: "DOOM",
    onload: function (dosbox) {
      dosbox_DOOM.run("https://thedoggybrad.github.io/doom_on_js-dos/DOOM-@evilution.zip", "./DOOM/DOOM.EXE");
    },
    onrun: function (dosbox, app) {
      console.log("App '" + app + "' is runned");
    }
  });

  var fsBtn = document.getElementById("fullscreen_DOOM");
  if(fsBtn){
      fsBtn.addEventListener("click", function() {
        dosbox_DOOM.requestFullScreen();
      });
  }
</script>
  </body>
</html>
